aid: stannp
name: Stannp
description: >
  Stannp is a direct mail platform that enables businesses to send physical
  postcards and letters programmatically via a REST API. The platform lets
  developers create campaigns, upload recipient lists, trigger individual mail
  pieces in real time, and track print and delivery status through webhooks and
  event endpoints. Authentication uses API key-based HTTP Basic Auth over HTTPS,
  and the API follows a simple JSON response envelope with success/data or
  success/error fields. Stannp serves businesses across the UK, US, and Canada
  with per-item pricing for letters and postcards at scale, and supports no-code
  integrations through Zapier and Make as well as official SDKs for PHP, Go, and
  C#.
